<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="boltGradW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#378ADD"/>
      <stop offset="100%" stop-color="#0C447C"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="480" height="160" rx="14" fill="#FFFFFF"/>

  <!-- Subtle glow -->
  <circle cx="80" cy="80" r="62" fill="#E6F1FB" opacity="0.8"/>
  <circle cx="80" cy="80" r="38" fill="#B5D4F4" opacity="0.3"/>

  <!-- Bolt shadow layer -->
  <polygon points="98,18  62,82  86,82  58,142  134,72  98,72" fill="#85B7EB" opacity="0.2"/>
  <!-- Main bolt -->
  <polygon points="95,22  60,84  84,84  56,138  130,70  94,70" fill="url(#boltGradW)"/>

  <!-- Spark dots -->
  <circle cx="140" cy="36" r="3.5" fill="#378ADD" opacity="0.7"/>
  <circle cx="152" cy="54" r="2"   fill="#185FA5" opacity="0.5"/>
  <circle cx="145" cy="22" r="1.8" fill="#378ADD" opacity="0.6"/>
  <circle cx="22"  cy="50" r="2.5" fill="#378ADD" opacity="0.5"/>
  <circle cx="14"  cy="70" r="1.5" fill="#185FA5" opacity="0.4"/>
  <circle cx="136" cy="122" r="2.5" fill="#378ADD" opacity="0.5"/>
  <circle cx="22"  cy="112" r="1.5" fill="#185FA5" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="168" y="74"  font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="38" font-weight="700" fill="#042C53" letter-spacing="-0.5">Setwise</text>
  <text x="170" y="111" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="21" font-weight="300" fill="#185FA5" letter-spacing="7">DIGITAL</text>

  <!-- Rule -->
  <line x1="168" y1="120" x2="458" y2="120" stroke="#85B7EB" stroke-width="0.8" opacity="0.6"/>

  <!-- Tagline -->
  <text x="170" y="138" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="10" font-weight="300" fill="#378ADD" letter-spacing="2">Technology Simplified.</text>
</svg>
